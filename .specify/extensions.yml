installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_specify:
  - extension: branch-convention
    command: speckit.branch-convention.validate
    enabled: true
    optional: true
    prompt: Validate branch naming convention before creating new feature?
    description: Check naming convention compliance before /specify creates a new
      branch
    condition: null
  after_implement:
  - extension: verify
    command: speckit.verify.run
    enabled: true
    optional: true
    prompt: Run verify to validate implementation against specification?
    description: Post-implementation verification gate
    condition: null
  - extension: review
    command: speckit.review.run
    enabled: true
    optional: true
    prompt: Run PR review on implemented changes?
    description: Comprehensive review after implementation
    condition: null
  - extension: ship
    command: speckit.ship.run
    enabled: true
    optional: true
    prompt: Ship this feature?
    description: Runs pre-flight checks, syncs branches, generates changelog, and
      creates PR
    condition: null
  after_specify:
  - extension: worktree
    command: speckit.worktree.create
    enabled: true
    optional: true
    prompt: Create an isolated worktree for this new feature?
    description: Auto-spawn a worktree after a new feature is specified
    condition: null
