name: Pipeline Guardian

# Handles two responsibilities:
# 1. Auto-fix: On every PR, attempt to auto-correct lint/format failures in-place
# 2. Notify: After the CI workflow completes, comment on the PR with a failure summary

on:
  pull_request:
    branches: [main, dev]
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Auto-fix lint & format on PRs
  # Runs on the pull_request event, before the
  # main CI checks. Commits any auto-fixable
  # issues back to the PR branch so CI can pass.
  # ─────────────────────────────────────────────
  autofix:
    name: Auto-fix lint & format
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply auto-fixes
        id: fix
        run: |
          pnpm lint:fix || true
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Files changed:"
            git diff --name-only
          fi

      - name: Commit auto-fixes
        if: steps.fix.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: auto-fix lint and formatting issues [skip ci]"
          git push

      - name: Comment on PR (auto-fix applied)
        if: steps.fix.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### Auto-fix applied',
                '',
                'Lint and formatting issues were detected and automatically corrected.',
                'Pull the latest commit before pushing new changes.',
              ].join('\n'),
            });

  # ─────────────────────────────────────────────
  # Job 2: Post failure summary comment after CI
  # Runs when the CI workflow completes with a
  # failure. Posts a summary comment on the PR
  # listing which jobs failed so the author
  # knows exactly what to fix manually.
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify CI failure
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Get failed jobs
        id: jobs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const failed = data.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => `- **${j.name}**: [View logs](${j.html_url})`);
            core.setOutput('failed_jobs', failed.join('\n'));
            core.setOutput('run_url', context.payload.workflow_run.html_url);
            core.setOutput('has_failures', failed.length > 0 ? 'true' : 'false');

      - name: Find PR number
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              core.setOutput('number', String(prs[0].number));
            } else {
              core.setOutput('number', '');
            }

      - name: Post failure comment
        if: steps.pr.outputs.number != '' && steps.jobs.outputs.has_failures == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const failedJobs = `${{ steps.jobs.outputs.failed_jobs }}`;
            const runUrl = `${{ steps.jobs.outputs.run_url }}`;
            const prNumber = parseInt(`${{ steps.pr.outputs.number }}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '### CI pipeline failed',
                '',
                'The following jobs failed and require manual attention:',
                '',
                failedJobs,
                '',
                `[View full run](${runUrl})`,
                '',
                '> Lint and format issues are auto-corrected by the Pipeline Guardian workflow.',
                '> Other failures (build, tests, typecheck) must be fixed manually.',
              ].join('\n'),
            });
